services:
  relay:
    build: .
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      CNSHELL_RELAY_DATABASE_URL: sqlite:///data/relay.sqlite?mode=rwc
      CNSHELL_RELAY_BIND: 0.0.0.0:8787
      CNSHELL_RELAY_BEHIND_TLS_PROXY: "1"
      CNSHELL_RELAY_ALLOW_UNVERIFIED_ACCOUNTS: "${CNSHELL_RELAY_ALLOW_UNVERIFIED_ACCOUNTS:-0}"
      CNSHELL_RELAY_SMTP_HOST: "${CNSHELL_RELAY_SMTP_HOST:-}"
      CNSHELL_RELAY_SMTP_PORT: "${CNSHELL_RELAY_SMTP_PORT:-}"
      CNSHELL_RELAY_SMTP_SECURITY: "${CNSHELL_RELAY_SMTP_SECURITY:-}"
      CNSHELL_RELAY_SMTP_FROM: "${CNSHELL_RELAY_SMTP_FROM:-}"
      CNSHELL_RELAY_SMTP_USERNAME: "${CNSHELL_RELAY_SMTP_USERNAME:-}"
      CNSHELL_RELAY_SMTP_PASSWORD: "${CNSHELL_RELAY_SMTP_PASSWORD:-}"
      CNSHELL_RELAY_SMTP_PASSWORD_FILE: "${CNSHELL_RELAY_SMTP_PASSWORD_FILE:-}"
      RUST_LOG: cnshell_team_relay=info,tower_http=info
    ports:
      - "127.0.0.1:${CNSHELL_RELAY_HOST_PORT:-8787}:8787"
    volumes:
      - relay-data:/data
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--fail",
          "--silent",
          "--show-error",
          "http://127.0.0.1:8787/ready",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  relay-data:
