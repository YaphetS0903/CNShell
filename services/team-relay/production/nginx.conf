worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    client_body_temp_path /tmp/client_body;
    proxy_temp_path /tmp/proxy;

    log_format cnshell_safe
        'request_id=$request_id method=$request_method status=$status '
        'bytes=$body_bytes_sent elapsed=$request_time upstream_status=$upstream_status';
    access_log /dev/stdout cnshell_safe;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    limit_req_zone $binary_remote_addr zone=general_per_ip:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth_per_ip:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=registration_per_ip:10m rate=3r/m;
    limit_conn_zone $binary_remote_addr zone=connections_per_ip:10m;

    limit_req_status 429;
    limit_req_log_level notice;
    limit_conn_status 429;
    limit_conn_log_level notice;

    upstream cnshell_relay {
        server relay:8787;
        keepalive 32;
    }

    include /etc/nginx/conf.d/*.conf;
}
