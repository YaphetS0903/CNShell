global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/relay-alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: cnshell-team-relay
    static_configs:
      - targets:
          - relay:8787

  - job_name: cnshell-relay-proxy
    static_configs:
      - targets:
          - proxy-metrics:9113
