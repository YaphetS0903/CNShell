services:
  relay:
    build: .
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      CNSHELL_RELAY_DATABASE_URL: sqlite:///data/relay.sqlite?mode=rwc
      CNSHELL_RELAY_BIND: 0.0.0.0:8787
      CNSHELL_RELAY_BEHIND_TLS_PROXY: "1"
      CNSHELL_RELAY_ALLOW_UNVERIFIED_ACCOUNTS: "0"
      CNSHELL_RELAY_SMTP_HOST: "${CNSHELL_RELAY_SMTP_HOST:?set the production SMTP host}"
      CNSHELL_RELAY_SMTP_PORT: "${CNSHELL_RELAY_SMTP_PORT:-465}"
      CNSHELL_RELAY_SMTP_SECURITY: "${CNSHELL_RELAY_SMTP_SECURITY:-tls}"
      CNSHELL_RELAY_SMTP_FROM: "${CNSHELL_RELAY_SMTP_FROM:?set the verified sender mailbox}"
      CNSHELL_RELAY_SMTP_USERNAME: "${CNSHELL_RELAY_SMTP_USERNAME:?set the SMTP username}"
      CNSHELL_RELAY_SMTP_PASSWORD_FILE: /run/secrets/cnshell-relay-smtp-password
      RUST_LOG: cnshell_team_relay=info,tower_http=info
    expose:
      - "8787"
    volumes:
      - relay-data:/data
      - type: bind
        source: "${CNSHELL_RELAY_SMTP_PASSWORD_HOST_FILE:?set an absolute SMTP password file}"
        target: /run/secrets/cnshell-relay-smtp-password
        read_only: true
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--fail",
          "--silent",
          "--show-error",
          "http://127.0.0.1:8787/ready",
        ]
      interval: 15s
      timeout: 3s
      retries: 4
      start_period: 10s
    networks:
      - relay-private
      - monitoring
      - relay-egress

  proxy:
    image: nginxinc/nginx-unprivileged:1.28.0-alpine@sha256:c97ff0bf7cbae369953c6da1232ec14ad9f971d66360c5698db0856a4cd657a0
    restart: unless-stopped
    depends_on:
      relay:
        condition: service_healthy
    environment:
      CNSHELL_RELAY_PUBLIC_HOST: "${CNSHELL_RELAY_PUBLIC_HOST:?set the exact public DNS name}"
    ports:
      - "${CNSHELL_RELAY_HTTP_BIND:-0.0.0.0}:${CNSHELL_RELAY_HTTP_PORT:-80}:8080"
      - "${CNSHELL_RELAY_HTTPS_BIND:-0.0.0.0}:${CNSHELL_RELAY_HTTPS_PORT:-443}:8443"
    volumes:
      - ./production/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./production/relay.conf.template:/etc/nginx/templates/relay.conf.template:ro
      - type: bind
        source: "${CNSHELL_RELAY_TLS_CERT_FILE:?set an absolute full-chain certificate file}"
        target: /etc/nginx/tls/tls.crt
        read_only: true
      - type: bind
        source: "${CNSHELL_RELAY_TLS_KEY_FILE:?set an absolute TLS private-key file}"
        target: /etc/nginx/tls/tls.key
        read_only: true
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /var/cache/nginx:size=16m,mode=0700
      - /var/run:size=1m,mode=0700
      - /etc/nginx/conf.d:size=1m,mode=0700
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "nginx", "-t", "-q"]
      interval: 15s
      timeout: 3s
      retries: 4
      start_period: 5s
    networks:
      - edge
      - relay-private
      - monitoring

  proxy-metrics:
    image: nginx/nginx-prometheus-exporter:1.4.2@sha256:6edfb73afd11f2d83ea4e8007f5068c3ffaa38078a6b0ad1339e5bd2f637aacd
    restart: unless-stopped
    depends_on:
      proxy:
        condition: service_healthy
    command:
      - --nginx.scrape-uri=http://proxy:8081/stub_status
    read_only: true
    tmpfs:
      - /tmp:size=4m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:v3.5.0@sha256:63805ebb8d2b3920190daf1cb14a60871b16fd38bed42b857a3182bc621f4996
    restart: unless-stopped
    depends_on:
      relay:
        condition: service_healthy
      proxy-metrics:
        condition: service_started
      alertmanager:
        condition: service_started
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${CNSHELL_RELAY_METRICS_RETENTION:-30d}
    ports:
      - "127.0.0.1:${CNSHELL_RELAY_PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./production/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./production/relay-alerts.yml:/etc/prometheus/relay-alerts.yml:ro
      - prometheus-data:/prometheus
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "/bin/promtool",
          "check",
          "healthy",
          "--url=http://127.0.0.1:9090",
        ]
      interval: 15s
      timeout: 3s
      retries: 4
      start_period: 10s
    networks:
      - monitoring

  alertmanager:
    image: prom/alertmanager:v0.28.1@sha256:27c475db5fb156cab31d5c18a4251ac7ed567746a2483ff264516437a39b15ba
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "127.0.0.1:${CNSHELL_RELAY_ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - type: bind
        source: "${CNSHELL_RELAY_ALERTMANAGER_CONFIG_FILE:?set an absolute Alertmanager config file}"
        target: /etc/alertmanager/alertmanager.yml
        read_only: true
      - alertmanager-data:/alertmanager
    read_only: true
    tmpfs:
      - /tmp:size=8m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - monitoring
      - alertmanager-egress

volumes:
  relay-data:
  prometheus-data:
  alertmanager-data:

networks:
  edge:
  relay-private:
    internal: true
  monitoring:
    internal: true
  relay-egress:
  alertmanager-egress:
