name: 错误报告
description: 报告可复现的连接、终端、文件、监控或 RDP 问题
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        感谢协助测试 CNshell。请不要提交密码、私钥、令牌、完整主机地址或未检查的原始日志。

        建议在 CNshell 中打开“设置 → 故障诊断 → 导出脱敏诊断”，自行检查后再附加。

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前检查
      options:
        - label: 我使用的是发布页中的最新 Beta，并已确认问题仍然存在。
          required: true
        - label: 我搜索过现有 Issue，没有发现相同问题。
          required: true
        - label: 我已移除密码、私钥、令牌、完整主机地址和其他敏感信息。
          required: true

  - type: dropdown
    id: area
    attributes:
      label: 问题区域
      options:
        - SSH 连接或认证
        - 终端或快捷命令
        - SFTP 或远端编辑
        - 服务器监控
        - RDP
        - 连接库、备份或同步
        - 安装、升级或启动
        - 界面、键盘或辅助功能
        - 其他
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: CNshell 版本
      description: 可在“关于 CNshell”或 GitHub Release 中查看。
      placeholder: 例如 v0.1.0
    validations:
      required: true

  - type: input
    id: mac
    attributes:
      label: Mac 环境
      description: 请填写 macOS 版本、Mac 型号或处理器架构。
      placeholder: 例如 macOS 15.5，Apple M2；或 macOS 13.7，Intel
    validations:
      required: true

  - type: input
    id: remote
    attributes:
      label: 远端环境
      description: 仅填写系统类型和版本，不要填写 IP、域名、用户名或凭据。不涉及远端时填写“不适用”。
      placeholder: 例如 Ubuntu 24.04 x86_64；Windows Server 2022；不适用
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 说明发生了什么，以及它对工作的影响。
      placeholder: 清楚、简短地描述问题。
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 从启动 CNshell 开始，按顺序列出最短复现流程。
      placeholder: |
        1. 打开……
        2. 点击……
        3. 等待……
        4. 出现……
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期结果
      placeholder: 你原本期望发生什么？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际结果与报错
      description: 可粘贴已经检查并脱敏的错误文字。
      placeholder: 实际发生了什么？界面显示了什么错误？
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: 出现频率
      options:
        - 每次都能复现
        - 经常出现
        - 偶尔出现
        - 只出现过一次
    validations:
      required: true

  - type: textarea
    id: attachments
    attributes:
      label: 截图与脱敏诊断
      description: 可拖入截图或脱敏诊断 JSON。截图前请遮盖主机、用户名、路径、命令输出和其他敏感内容。
      placeholder: 将文件拖到这里，或说明暂时无法提供。

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 例如问题是否与睡眠唤醒、网络切换、代理、长时间挂机或特定文件有关。
