name: Windows Packaging

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/windows-package.yml"
      - "package.json"
      - "package-lock.json"
      - "scripts/build-desktop.mjs"
      - "scripts/build-sidecar.mjs"
      - "scripts/build-freerdp-sidecar.ps1"
      - "scripts/patches/**"
      - "scripts/test-windows-installer.ps1"
      - "scripts/verify-windows-pe.ps1"
      - "src/**"
      - "src-tauri/**"
  workflow_dispatch:

concurrency:
  group: windows-package-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package:
    name: Windows ${{ matrix.label }} NSIS
    runs-on: windows-2025
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: x64
            architecture: x64
            target: x86_64-pc-windows-msvc
            runtime: true
          - label: ARM64 Preview
            architecture: arm64
            target: aarch64-pc-windows-msvc
            runtime: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20.20.2
          cache: npm
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: windows-package-${{ matrix.architecture }}
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            src-tauri/target/freerdp-sidecar-windows/downloads
            src-tauri/target/freerdp-sidecar-windows/sources
            src-tauri/target/freerdp-sidecar-windows/vcpkg
          key: freerdp-3.28.0-vcpkg-908da3a-${{ matrix.architecture }}-v1
      - run: npm ci
      - name: Parse Windows packaging scripts
        shell: powershell
        run: |
          $failed = $false
          foreach ($path in @(
            "scripts/build-freerdp-sidecar.ps1",
            "scripts/test-windows-installer.ps1",
            "scripts/verify-windows-pe.ps1"
          )) {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $path), [ref]$tokens, [ref]$errors
            )
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error "$path`: $($_.Message)" }
              $failed = $true
            }
          }
          if ($failed) { throw "PowerShell packaging script parse failed" }
      - name: Build pinned Windows FreeRDP
        shell: powershell
        env:
          CNSHELL_WINDOWS_ARCH: ${{ matrix.architecture }}
        run: npm run build:freerdp
      - name: Verify FreeRDP architecture and x64 runtime
        shell: powershell
        run: |
          ./scripts/verify-windows-pe.ps1 src-tauri/resources/freerdp/sdl-freerdp.exe ${{ matrix.architecture }}
          if ("${{ matrix.runtime }}" -eq "true") {
            & src-tauri/resources/freerdp/sdl-freerdp.exe /version
            if ($LASTEXITCODE -ne 0) { throw "FreeRDP x64 runtime smoke failed" }
          }
      - name: Build NSIS installer
        shell: powershell
        env:
          CNSHELL_WINDOWS_ARCH: ${{ matrix.architecture }}
          CNSHELL_SIDECARS_PREBUILT: "1"
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles nsis
      - name: Verify application PE and collect installer
        id: bundle
        shell: powershell
        run: |
          ./scripts/verify-windows-pe.ps1 src-tauri/target/${{ matrix.target }}/release/cnshell.exe ${{ matrix.architecture }}
          $installers = @(Get-ChildItem "src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe")
          if ($installers.Count -ne 1 -or $installers[0].Length -eq 0) {
            throw "Expected exactly one non-empty NSIS installer"
          }
          "installer=$($installers[0].FullName)" >> $env:GITHUB_OUTPUT
      - name: Install, upgrade, uninstall, and reinstall x64
        if: matrix.runtime
        shell: powershell
        env:
          CI: "true"
        run: ./scripts/test-windows-installer.ps1 "${{ steps.bundle.outputs.installer }}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cnshell-windows-${{ matrix.architecture }}-unsigned
          path: ${{ steps.bundle.outputs.installer }}
          if-no-files-found: error
          retention-days: 14
