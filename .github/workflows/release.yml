name: Signed Release Candidate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 90
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20.20.2
          cache: npm
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.96.0
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm run build:mosh
      - run: npx playwright install webkit
      - name: Install Developer ID certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          test -n "$APPLE_CERTIFICATE_BASE64"
          test -n "$APPLE_CERTIFICATE_PASSWORD"
          test -n "$APPLE_SIGNING_IDENTITY"
          certificate_path="$RUNNER_TEMP/DeveloperID.p12"
          keychain_path="$RUNNER_TEMP/cnshell-signing.keychain-db"
          keychain_password="$(openssl rand -hex 32)"
          printf '%s' "$APPLE_CERTIFICATE_BASE64" | /usr/bin/base64 -D > "$certificate_path"
          chmod 600 "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path" | grep -F "\"$APPLE_SIGNING_IDENTITY\"" >/dev/null
      - name: Prepare private release configuration
        env:
          TAURI_RELEASE_CONFIG: ${{ secrets.TAURI_RELEASE_CONFIG }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          set -euo pipefail
          test -n "$TAURI_RELEASE_CONFIG"
          test -n "$APPLE_API_KEY_CONTENT"
          printf '%s' "$TAURI_RELEASE_CONFIG" > src-tauri/tauri.release.json
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/AuthKey.p8"
      - name: Build, sign, notarize and verify
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          UPDATER_DOWNLOAD_BASE_URL: ${{ vars.UPDATER_DOWNLOAD_BASE_URL }}
        run: ./scripts/release.sh
      - name: Remove release credentials
        if: always()
        run: |
          set -euo pipefail
          keychain_path="$RUNNER_TEMP/cnshell-signing.keychain-db"
          rm -f "$RUNNER_TEMP/DeveloperID.p12" "$RUNNER_TEMP/AuthKey.p8" src-tauri/tauri.release.json
          if [[ -e "$keychain_path" ]]; then
            security delete-keychain "$keychain_path"
          fi
          test ! -e "$RUNNER_TEMP/DeveloperID.p12"
          test ! -e "$RUNNER_TEMP/AuthKey.p8"
          test ! -e src-tauri/tauri.release.json
          test ! -e "$keychain_path"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: success()
        with:
          name: cnshell-signed-candidate
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/universal-apple-darwin/release/bundle/latest.json
          if-no-files-found: error
          retention-days: 14
