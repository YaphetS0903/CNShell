name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Frontend and Rust
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20.20.2
          cache: npm
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.96.0
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            src-tauri
            services/team-relay
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - name: Prepare generated resource directories for Rust checks
        run: mkdir -p src-tauri/resources/freerdp
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - run: cargo clippy --manifest-path services/team-relay/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path services/team-relay/Cargo.toml
      - run: npm run test:relay-ops
      - run: npm audit --audit-level=moderate

  relay-container:
    name: Relay Docker and Compose
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20.20.2
          cache: npm
      - name: Report container runtime
        run: |
          docker version
          docker compose version
      - name: Build and run relay container smoke
        run: npm run test:relay-container
      - name: Validate production proxy, rate limits, and monitoring
        run: npm run test:relay-production-config

  desktop-ui:
    name: Browser UI and PTY fixture
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20.20.2
          cache: npm
      - run: npm ci
      - run: npx playwright install webkit
      - run: npm run test:e2e
      - name: Run PTY fixture in an isolated Python environment
        run: |
          python3 -m venv "$RUNNER_TEMP/cnshell-pty-venv"
          "$RUNNER_TEMP/cnshell-pty-venv/bin/python3" -m pip install --disable-pip-version-check -r scripts/requirements-pty-fixture.txt
          PATH="$RUNNER_TEMP/cnshell-pty-venv/bin:$PATH" npm run test:pty-fixture

  universal-build:
    name: Universal App smoke build
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20.20.2
          cache: npm
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.96.0
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm run build:mosh
      - run: APPLE_SIGNING_IDENTITY=- npm run tauri build -- --target universal-apple-darwin --bundles app
      - name: Verify architectures and minimum macOS
        run: |
          set -euo pipefail
          app=src-tauri/target/universal-apple-darwin/release/bundle/macos/CNshell.app
          executable=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app/Contents/Info.plist")
          test "$(/usr/libexec/PlistBuddy -c 'Print :LSMinimumSystemVersion' "$app/Contents/Info.plist")" = 13.0
          test -n "$(/usr/libexec/PlistBuddy -c 'Print :NSMicrophoneUsageDescription' "$app/Contents/Info.plist")"
          architectures="$(lipo -archs "$app/Contents/MacOS/$executable")"
          [[ " $architectures " == *" arm64 "* && " $architectures " == *" x86_64 "* ]]
          codesign -dv --verbose=4 "$app" 2>&1 | grep -E 'flags=.*runtime' >/dev/null
          helper="$app/Contents/Resources/freerdp/sdl-freerdp"
          test -x "$helper"
          helper_architectures="$(lipo -archs "$helper")"
          [[ " $helper_architectures " == *" arm64 "* && " $helper_architectures " == *" x86_64 "* ]]
          codesign -dv --verbose=4 "$helper" 2>&1 | grep -E 'flags=.*runtime' >/dev/null
          preflight="$(env -i PATH=/usr/bin:/bin:/usr/sbin:/sbin HOME="$HOME" "$app/Contents/MacOS/$executable" --rdp-preflight)"
          printf '%s\n' "$preflight" | grep -F '"available":true' >/dev/null
          printf '%s\n' "$preflight" | grep -F 'Contents/Resources/freerdp/sdl-freerdp' >/dev/null
          mosh="$app/Contents/Resources/mosh/mosh-client"
          test -x "$mosh"
          mosh_architectures="$(lipo -archs "$mosh")"
          [[ " $mosh_architectures " == *" arm64 "* && " $mosh_architectures " == *" x86_64 "* ]]
          codesign -dv --verbose=4 "$mosh" 2>&1 | grep -E 'flags=.*runtime' >/dev/null
          test -s "$app/Contents/Resources/mosh/licenses/Mosh-GPL-3.0-or-later.txt"
          env TERM=xterm-256color "$mosh" -c >/dev/null
          kermit="$app/Contents/Resources/kermit/gkermit"
          test -x "$kermit"
          kermit_architectures="$(lipo -archs "$kermit")"
          [[ " $kermit_architectures " == *" arm64 "* && " $kermit_architectures " == *" x86_64 "* ]]
          codesign -dv --verbose=4 "$kermit" 2>&1 | grep -E 'flags=.*runtime' >/dev/null
          test -s "$app/Contents/Resources/kermit/licenses/G-Kermit-GPL-2.0.txt"
          kermit_source="$app/Contents/Resources/kermit/source/gku201.tar.gz"
          echo "19f9ac00d7b230d0a841928a25676269363c2925afc23e62704cde516fc1abbd  $kermit_source" | shasum -a 256 -c -
          "$kermit" -h 2>&1 | grep -F 'G-Kermit 2.01' >/dev/null
          codesign --verify --deep --strict --verbose=2 "$app"
