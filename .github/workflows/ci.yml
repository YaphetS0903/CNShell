name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Frontend and Rust
    runs-on: macos-13
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            services/team-relay
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - run: cargo clippy --manifest-path services/team-relay/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path services/team-relay/Cargo.toml
      - run: npm run test:relay-ops
      - run: npm audit --audit-level=moderate

  relay-container:
    name: Relay Docker and Compose
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Report container runtime
        run: |
          docker version
          docker compose version
      - name: Build and run relay container smoke
        run: npm run test:relay-container

  desktop-ui:
    name: Browser UI and PTY fixture
    runs-on: macos-13
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install webkit
      - run: npm run test:e2e
      - run: python3 -m pip install --user paramiko
      - run: npm run test:pty-fixture

  universal-build:
    name: Universal App smoke build
    runs-on: macos-13
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm run build:mosh
      - run: APPLE_SIGNING_IDENTITY=- npm run tauri build -- --target universal-apple-darwin --bundles app
      - name: Verify architectures and minimum macOS
        run: |
          set -euo pipefail
          app=src-tauri/target/universal-apple-darwin/release/bundle/macos/CNshell.app
          executable=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app/Contents/Info.plist")
          test "$(/usr/libexec/PlistBuddy -c 'Print :LSMinimumSystemVersion' "$app/Contents/Info.plist")" = 13.0
          architectures="$(lipo -archs "$app/Contents/MacOS/$executable")"
          [[ " $architectures " == *" arm64 "* && " $architectures " == *" x86_64 "* ]]
          helper="$app/Contents/Resources/freerdp/sdl-freerdp"
          test -x "$helper"
          helper_architectures="$(lipo -archs "$helper")"
          [[ " $helper_architectures " == *" arm64 "* && " $helper_architectures " == *" x86_64 "* ]]
          preflight="$(env -i PATH=/usr/bin:/bin:/usr/sbin:/sbin HOME="$HOME" "$app/Contents/MacOS/$executable" --rdp-preflight)"
          printf '%s\n' "$preflight" | grep -Fq '"available":true'
          printf '%s\n' "$preflight" | grep -Fq 'Contents/Resources/freerdp/sdl-freerdp'
          mosh="$app/Contents/Resources/mosh/mosh-client"
          test -x "$mosh"
          mosh_architectures="$(lipo -archs "$mosh")"
          [[ " $mosh_architectures " == *" arm64 "* && " $mosh_architectures " == *" x86_64 "* ]]
          test -s "$app/Contents/Resources/mosh/licenses/Mosh-GPL-3.0-or-later.txt"
          "$mosh" -c >/dev/null
          codesign --verify --deep --strict --verbose=2 "$app"
